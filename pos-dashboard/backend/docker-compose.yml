version: '3.8'

services:
  db:
    image: postgres:15
    container_name: pos_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: pos_db
    ports:
      - "5455:5432"
    volumes:
      - pos_dashboard_pgdata:/var/lib/postgresql/data

volumes:
  pos_dashboard_pgdata:
